openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Secure Ephemeral Data Exchange Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: shares
    description: Share operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /health:
    get:
      operationId: healthDetailed
      tags: [health]
      summary: Detailed health check (requires API key)
      description: Returns detailed telemetry — requires Authorization Bearer header
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Detailed health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetailedHealthStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shares:
    post:
      operationId: createShare
      tags: [shares]
      summary: Create a new share
      description: Upload encrypted data and create a one-time share link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShareRequest"
      responses:
        "201":
          description: Share created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateShareResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitErrorResponse"
        "507":
          description: Insufficient memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shares/{shareId}:
    get:
      operationId: getShare
      tags: [shares]
      summary: Retrieve a share (one-time access)
      description: Fetch encrypted data for a share. Marks it as accessed immediately.
      parameters:
        - name: shareId
          in: path
          required: true
          schema:
            type: string
            minLength: 64
            maxLength: 64
        - name: accessNonce
          in: query
          required: false
          description: |
            HMAC-SHA256 nonce issued by the peek endpoint. Required when the
            server has HCAPTCHA_SECRET_KEY configured. Format: base64url(sig).timestamp
          schema:
            type: string
      responses:
        "200":
          description: Share data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetShareResponse"
        "403":
          description: Missing or invalid access nonce (only when HCAPTCHA_SECRET_KEY is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Share not found or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareErrorResponse"
        "410":
          description: Share already accessed or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareErrorResponse"
    delete:
      operationId: deleteShare
      tags: [shares]
      summary: Delete a share after download complete
      description: Called by receiver after all files downloaded / text copied
      parameters:
        - name: shareId
          in: path
          required: true
          schema:
            type: string
            minLength: 64
            maxLength: 64
      responses:
        "200":
          description: Share deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteShareResponse"
        "404":
          description: Share not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shares/{shareId}/peek:
    get:
      operationId: peekShare
      tags: [shares]
      summary: Peek at share metadata without consuming it
      description: Returns size and whether password is required — does NOT mark as accessed
      parameters:
        - name: shareId
          in: path
          required: true
          schema:
            type: string
            minLength: 64
            maxLength: 64
        - name: captchaToken
          in: query
          required: false
          schema:
            type: string
          description: hCaptcha response token (required when server has HCAPTCHA_SECRET_KEY configured)
      responses:
        "200":
          description: Share metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeekShareResponse"
        "400":
          description: CAPTCHA validation failed (only returned when server has HCAPTCHA_SECRET_KEY configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Share not found or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareErrorResponse"
        "410":
          description: Share already accessed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareErrorResponse"

  /shares/upload-url:
    post:
      operationId: createShareUploadUrl
      tags: [shares]
      summary: Request a presigned R2 upload URL
      description: Returns a presigned R2 PUT URL for direct client-to-storage upload of encrypted data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitErrorResponse"
        "501":
          description: R2 not configured on this deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shares/confirm:
    post:
      operationId: confirmShare
      tags: [shares]
      summary: Confirm a direct R2 upload and activate the share
      description: Called after the client has successfully PUT data to the presigned URL; verifies the R2 object exists and activates the share
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmShareRequest"
      responses:
        "201":
          description: Share activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmShareResponse"
        "400":
          description: Invalid request body or missing shareId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Pending upload not found or R2 object missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhook/test:
    post:
      operationId: testWebhook
      tags: [shares]
      summary: Test a webhook URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestWebhookRequest"
      responses:
        "200":
          description: Webhook test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestWebhookResponse"
        "400":
          description: Invalid webhook URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DetailedHealthStatus:
      type: object
      properties:
        status:
          type: string
        containers_created:
          type: integer
        containers_delivered:
          type: integer
        memory_used_mb:
          type: number
        memory_free_mb:
          type: number
        timestamp:
          type: string
      required:
        - status
        - containers_created
        - containers_delivered
        - memory_used_mb
        - memory_free_mb
        - timestamp

    FileMetadata:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        type:
          type: string
        originalIndex:
          type: integer
      required:
        - name
        - size
        - type
        - originalIndex

    CreateShareRequest:
      type: object
      properties:
        encryptedData:
          type: string
          description: Base64-encoded encrypted payload (ChaCha20-Poly1305)
        ttl:
          type: integer
          description: Time-to-live in seconds (60 to 345600)
          minimum: 60
          maximum: 345600
        passwordHash:
          type: string
          nullable: true
          description: Optional PBKDF2-derived hash of the password (for verification)
        passwordSalt:
          type: string
          nullable: true
          description: Base64-encoded salt used for password hashing
        webhookUrl:
          type: string
          nullable: true
          description: Optional HTTPS webhook URL
        webhookMessage:
          type: string
          nullable: true
          description: Optional custom webhook message
        fileMetadata:
          type: array
          items:
            $ref: "#/components/schemas/FileMetadata"
          nullable: true
        shareType:
          type: string
          enum: [text, files, mixed]
        totalSize:
          type: integer
          description: Total size of the payload in bytes
        captchaToken:
          type: string
          description: hCaptcha response token; empty string accepted only when server-side verification is disabled (dev mode)
      required:
        - encryptedData
        - ttl
        - shareType
        - totalSize
        - captchaToken

    CreateShareResponse:
      type: object
      properties:
        shareId:
          type: string
        expiresAt:
          type: string
          description: ISO timestamp when share expires
      required:
        - shareId
        - expiresAt

    GetShareResponse:
      type: object
      properties:
        encryptedData:
          type: string
        fileMetadata:
          type: array
          items:
            $ref: "#/components/schemas/FileMetadata"
          nullable: true
        passwordRequired:
          type: boolean
        passwordSalt:
          type: string
          nullable: true
        shareType:
          type: string
          enum: [text, files, mixed]
        totalSize:
          type: integer
        webhookUrl:
          type: string
          nullable: true
        webhookMessage:
          type: string
          nullable: true
      required:
        - encryptedData
        - passwordRequired
        - shareType
        - totalSize

    PeekShareResponse:
      type: object
      properties:
        totalSize:
          type: integer
        passwordRequired:
          type: boolean
        shareType:
          type: string
          enum: [text, files, mixed]
        fileCount:
          type: integer
        expiresAt:
          type: string
        accessNonce:
          type: string
          description: |
            HMAC-SHA256 nonce to be passed as ?accessNonce= when calling GET
            /shares/{shareId}. Only present when HCAPTCHA_SECRET_KEY is set
            on the server. Valid for 5 minutes.
      required:
        - totalSize
        - passwordRequired
        - shareType
        - fileCount
        - expiresAt

    DeleteShareResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    TestWebhookRequest:
      type: object
      properties:
        webhookUrl:
          type: string
      required:
        - webhookUrl

    TestWebhookResponse:
      type: object
      properties:
        success:
          type: boolean
        statusCode:
          type: integer
          nullable: true
        message:
          type: string
      required:
        - success
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    RateLimitErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        retryAfterSeconds:
          type: integer
      required:
        - error
        - message
        - retryAfterSeconds

    UploadUrlRequest:
      type: object
      properties:
        ttl:
          type: integer
          description: Time-to-live in seconds (60 to 345600)
          minimum: 60
          maximum: 345600
        shareType:
          type: string
          enum: [text, files, mixed]
        totalSize:
          type: integer
          description: Total size of the encrypted payload in bytes
        passwordHash:
          type: string
          nullable: true
          description: Optional PBKDF2-derived hash of the password
        passwordSalt:
          type: string
          nullable: true
          description: Base64-encoded salt used for password hashing
        webhookUrl:
          type: string
          nullable: true
          description: Optional HTTPS webhook URL
        webhookMessage:
          type: string
          nullable: true
          description: Optional custom webhook message
        fileMetadata:
          type: array
          items:
            $ref: "#/components/schemas/FileMetadata"
          nullable: true
        captchaToken:
          type: string
          description: hCaptcha response token; empty string accepted only when server-side verification is disabled (dev mode)
      required:
        - ttl
        - shareType
        - totalSize

    UploadUrlResponse:
      type: object
      properties:
        shareId:
          type: string
          description: Temporary share ID for the pending upload
        uploadUrl:
          type: string
          description: Presigned R2 PUT URL to upload encrypted data directly
        expiresAt:
          type: string
          description: ISO timestamp when the presigned URL expires
      required:
        - shareId
        - uploadUrl
        - expiresAt

    ConfirmShareRequest:
      type: object
      properties:
        shareId:
          type: string
          description: The shareId received from the upload-url response
      required:
        - shareId

    ConfirmShareResponse:
      type: object
      properties:
        shareId:
          type: string
          description: The activated share ID
        expiresAt:
          type: string
          description: ISO timestamp when the share expires
      required:
        - shareId
        - expiresAt

    ShareErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        humorousMessage:
          type: string
      required:
        - error
        - message
        - humorousMessage
