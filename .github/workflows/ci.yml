name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  schedule:
    - cron: '0 9 * * 1'

jobs:
  ci:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        env:
          VITE_HCAPTCHA_SITE_KEY: ${{ secrets.VITE_HCAPTCHA_SITE_KEY }}
          VITE_USE_R2_UPLOADS: ${{ secrets.VITE_USE_R2_UPLOADS }}
        run: pnpm build

      - name: Upload dist artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
        uses: actions/upload-artifact@v4
        with:
          name: ephemeral-share-dist-${{ github.ref_name }}
          path: artifacts/ephemeral-share/dist
          retention-days: 1

      - name: Test
        run: pnpm test

      - name: Test deploy.sh saved-defaults
        run: bash tests/deploy-saved-defaults.sh

      - name: Test deploy.sh dry-run
        run: bash tests/deploy-dry-run.sh

      - name: Test staging-bootstrap.sh dry-run
        run: bash tests/staging-bootstrap-dry-run.sh

  notify-on-failure:
    name: Email on scheduled failure
    runs-on: ubuntu-latest
    needs: ci
    if: ${{ always() && needs.ci.result == 'failure' && github.event_name == 'schedule' }}

    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Weekly CI failed in ${{ github.repository }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          body: |
            The weekly scheduled CI run failed for ${{ github.repository }}.

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please check the logs above for details on which step failed.
