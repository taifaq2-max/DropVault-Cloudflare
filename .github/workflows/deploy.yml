name: Deploy to Cloudflare

on:
  push:
    branches: [main, staging]

jobs:
  deploy-production:
    name: Test, Build & Deploy (production)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build frontend
        env:
          VITE_HCAPTCHA_SITE_KEY: ${{ secrets.VITE_HCAPTCHA_SITE_KEY }}
          VITE_USE_R2_UPLOADS: ${{ secrets.VITE_USE_R2_UPLOADS }}
        run: pnpm --filter @workspace/ephemeral-share run build

      - name: Deploy Worker
        working-directory: artifacts/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

      - name: Deploy frontend to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          ./artifacts/cloudflare/node_modules/.bin/wrangler pages deploy \
            artifacts/ephemeral-share/dist/public \
            --project-name "${{ secrets.CF_PAGES_PROJECT }}" \
            --commit-dirty=true

  deploy-staging:
    name: Test, Build & Deploy (staging)
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build frontend
        env:
          VITE_HCAPTCHA_SITE_KEY: ${{ secrets.VITE_HCAPTCHA_SITE_KEY }}
          VITE_USE_R2_UPLOADS: ${{ secrets.VITE_USE_R2_UPLOADS }}
        run: pnpm --filter @workspace/ephemeral-share run build

      - name: Deploy Worker (staging)
        working-directory: artifacts/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy --env staging

      - name: Deploy frontend to Cloudflare Pages (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          ./artifacts/cloudflare/node_modules/.bin/wrangler pages deploy \
            artifacts/ephemeral-share/dist/public \
            --project-name "${{ secrets.CF_PAGES_PROJECT_STAGING }}" \
            --commit-dirty=true
