name: Deploy to Cloudflare

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, staging]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy (staging)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'staging'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download dist artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: ephemeral-share-dist-staging
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/ephemeral-share/dist

      - name: Validate downloaded dist artifact
        id: validate-artifact
        run: |
          DIST_DIR="artifacts/ephemeral-share/dist"
          if [ ! -d "$DIST_DIR" ]; then
            echo "::error::Dist directory '$DIST_DIR' does not exist. The CI artifact may have expired or failed to download."
            exit 1
          fi
          FILE_COUNT=$(find "$DIST_DIR" -type f | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::Dist directory '$DIST_DIR' is empty. The CI artifact may have expired or the upload step produced no files."
            exit 1
          fi
          echo "Artifact validation passed: $FILE_COUNT file(s) found in $DIST_DIR."

      - name: Check required staging secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PAGES_PROJECT_STAGING: ${{ secrets.CF_PAGES_PROJECT_STAGING }}
          STAGING_SESSION_SECRET: ${{ secrets.STAGING_SESSION_SECRET }}
          STAGING_HCAPTCHA_SECRET_KEY: ${{ secrets.STAGING_HCAPTCHA_SECRET_KEY }}
          STAGING_R2_ACCESS_KEY_ID: ${{ secrets.STAGING_R2_ACCESS_KEY_ID }}
          STAGING_R2_ACCESS_KEY_SECRET: ${{ secrets.STAGING_R2_ACCESS_KEY_SECRET }}
        run: |
          missing=()
          [ -z "$CLOUDFLARE_API_TOKEN" ]         && missing+=(CLOUDFLARE_API_TOKEN)
          [ -z "$CF_ACCOUNT_ID" ]                && missing+=(CF_ACCOUNT_ID)
          [ -z "$CF_PAGES_PROJECT_STAGING" ]     && missing+=(CF_PAGES_PROJECT_STAGING)
          [ -z "$STAGING_SESSION_SECRET" ]       && missing+=(STAGING_SESSION_SECRET)
          [ -z "$STAGING_HCAPTCHA_SECRET_KEY" ]  && missing+=(STAGING_HCAPTCHA_SECRET_KEY)
          [ -z "$STAGING_R2_ACCESS_KEY_ID" ]     && missing+=(STAGING_R2_ACCESS_KEY_ID)
          [ -z "$STAGING_R2_ACCESS_KEY_SECRET" ] && missing+=(STAGING_R2_ACCESS_KEY_SECRET)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required staging secrets: ${missing[*]}"
            exit 1
          fi

      - name: Push staging Worker secrets
        working-directory: artifacts/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.STAGING_SESSION_SECRET }}"       | pnpm exec wrangler secret put SESSION_SECRET       --env staging
          echo "${{ secrets.STAGING_HCAPTCHA_SECRET_KEY }}"  | pnpm exec wrangler secret put HCAPTCHA_SECRET_KEY  --env staging
          echo "${{ secrets.STAGING_R2_ACCESS_KEY_ID }}"     | pnpm exec wrangler secret put R2_ACCESS_KEY_ID     --env staging
          echo "${{ secrets.STAGING_R2_ACCESS_KEY_SECRET }}" | pnpm exec wrangler secret put R2_ACCESS_KEY_SECRET --env staging

      - name: Deploy Worker (staging)
        working-directory: artifacts/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -o pipefail
          pnpm exec wrangler deploy --env staging 2>&1 | tee /tmp/worker-deploy.log
          WORKER_URL=$(grep -oE 'https://[^ ]+\.workers\.dev[^ ]*' /tmp/worker-deploy.log | tail -1 || true)
          echo "## Staging Worker" >> $GITHUB_STEP_SUMMARY
          echo "${WORKER_URL:-Deploy succeeded — URL not captured}" >> $GITHUB_STEP_SUMMARY

      - name: Deploy frontend to Cloudflare Pages (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -o pipefail
          ./artifacts/cloudflare/node_modules/.bin/wrangler pages deploy \
            artifacts/ephemeral-share/dist/public \
            --project-name "${{ secrets.CF_PAGES_PROJECT_STAGING }}" \
            --commit-dirty=true 2>&1 | tee /tmp/pages-deploy.log
          PAGES_URL=$(grep -oE 'https://[^ ]+\.pages\.dev[^ ]*' /tmp/pages-deploy.log | tail -1 || true)
          echo "## Staging Pages" >> $GITHUB_STEP_SUMMARY
          echo "${PAGES_URL:-Deploy succeeded — URL not captured}" >> $GITHUB_STEP_SUMMARY

  deploy-production:
    name: Deploy (production)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download dist artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: ephemeral-share-dist-main
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/ephemeral-share/dist

      - name: Check required production secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PAGES_PROJECT: ${{ secrets.CF_PAGES_PROJECT }}
          PRODUCTION_FRONTEND_URL: ${{ secrets.PRODUCTION_FRONTEND_URL }}
        run: |
          missing=()
          [ -z "$CLOUDFLARE_API_TOKEN" ]    && missing+=(CLOUDFLARE_API_TOKEN)
          [ -z "$CF_ACCOUNT_ID" ]           && missing+=(CF_ACCOUNT_ID)
          [ -z "$CF_PAGES_PROJECT" ]        && missing+=(CF_PAGES_PROJECT)
          [ -z "$PRODUCTION_FRONTEND_URL" ] && missing+=(PRODUCTION_FRONTEND_URL)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required production secrets: ${missing[*]}"
            exit 1
          fi

      - name: Deploy Worker (production)
        working-directory: artifacts/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -o pipefail
          pnpm exec wrangler deploy \
            --var FRONTEND_URL:${{ secrets.PRODUCTION_FRONTEND_URL }} \
            2>&1 | tee /tmp/worker-deploy.log
          WORKER_URL=$(grep -oE 'https://[^ ]+\.workers\.dev[^ ]*' /tmp/worker-deploy.log | tail -1 || true)
          echo "## Production Worker" >> $GITHUB_STEP_SUMMARY
          echo "${WORKER_URL:-Deploy succeeded — URL not captured}" >> $GITHUB_STEP_SUMMARY

      - name: Deploy frontend to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -o pipefail
          ./artifacts/cloudflare/node_modules/.bin/wrangler pages deploy \
            artifacts/ephemeral-share/dist/public \
            --project-name "${{ secrets.CF_PAGES_PROJECT }}" \
            --commit-dirty=true 2>&1 | tee /tmp/pages-deploy.log
          PAGES_URL=$(grep -oE 'https://[^ ]+\.pages\.dev[^ ]*' /tmp/pages-deploy.log | tail -1 || true)
          echo "## Production Pages" >> $GITHUB_STEP_SUMMARY
          echo "${PAGES_URL:-Deploy succeeded — URL not captured}" >> $GITHUB_STEP_SUMMARY
