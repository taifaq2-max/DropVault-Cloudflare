# ────────────────────────────────────────────────────────────────────────────
# VaultDrop — Local testing compose (NO TLS)
#
# No certificates required. Listens on http://localhost:3000
#
# Start:  docker compose -f docker-compose.local.yml up -d --build
# Stop:   docker compose -f docker-compose.local.yml down
# ────────────────────────────────────────────────────────────────────────────

services:

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: vaultdrop-api
    restart: unless-stopped
    environment:
      PORT: "8080"
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:-change-me-this-is-not-secure}
      DEBUG: ${DEBUG:-true}
    networks:
      - internal
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:8080/api/healthz',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    image: vaultdrop-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Plain-HTTP nginx config — no TLS certs required
      - ./docker/nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
