# ────────────────────────────────────────────────────────────────────────────
# VaultDrop — nginx TLS production config
# Serves static frontend, proxies /api/* to the api container.
# Certificates are bind-mounted from the host (see docker-compose.yml).
# ────────────────────────────────────────────────────────────────────────────

# Redirect all plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # ── TLS certificates ───────────────────────────────────────────────────
    # Mount these files via docker-compose volumes (see docker-compose.yml).
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ── Modern TLS settings (Mozilla Intermediate) ─────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling (requires a CA chain in fullchain.pem)
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                                          always;
    add_header X-Content-Type-Options     "nosniff"                                       always;
    add_header Referrer-Policy            "no-referrer"                                   always;
    add_header X-XSS-Protection           "1; mode=block"                                 always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none';"
        always;

    # ── Static frontend ────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;
    gzip  on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # SPA fallback: unknown paths → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached (triggers new asset hashes on deploy)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # Vite hashes asset filenames — cache them aggressively
    location ~* \.(js|css|woff2?|ttf|png|jpg|jpeg|svg|ico|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API reverse proxy ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass             http://api:8080/api/;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     30s;
        proxy_send_timeout     30s;
        proxy_connect_timeout  5s;
        client_max_body_size   4m;

        # No caching for API responses
        add_header Cache-Control "no-store" always;
    }
}
