# ────────────────────────────────────────────────────────────────────────────
# VaultDrop — nginx local development config (NO TLS)
# Used with docker-compose.local.yml for testing without certificates.
# Listens on port 3000 only.
# ────────────────────────────────────────────────────────────────────────────

server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;
    gzip  on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Basic security headers (no HSTS without TLS)
    add_header X-Frame-Options        "DENY"    always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "no-referrer" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # API reverse proxy → api container on internal network
    location /api/ {
        proxy_pass            http://api:8080/api/;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto http;
        proxy_read_timeout    30s;
        client_max_body_size  4m;
        add_header Cache-Control "no-store" always;
    }
}
